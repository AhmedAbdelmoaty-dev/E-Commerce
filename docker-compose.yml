services:
  app:
   image: ecommerce:latest
   container_name: ecommerce
   build:
      context: .
      dockerfile: Dockerfile
   ports:
    - "8080:8080"
   environment:
     ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=E-Commerce;User=root;Password=admin;"
   depends_on:
     - mysql 
   networks:
      - e-commerce-network

  mysql:
    image: mysql:latest
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: admin
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    
    networks:
      - e-commerce-network
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
       - redis_data:/data

volumes:
      redis_data:
      mysql_data:

networks:
    e-commerce-network: